<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Data Drift</title>
  <style>
    body { margin:0; background:#0f1117; overflow:hidden; color:white; font-family:sans-serif;}
    canvas { display:block; margin:auto; background:#0a0c10; }
    #ui { position:absolute; top:10px; left:10px; }
    #gameOver {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      display:none;
      text-align:center;
    }
    button { padding:10px 20px; background:#00ffcc; border:none; cursor:pointer; }
  </style>
</head>

<body>
<div id="ui">Score: <span id="score">0</span></div>

<div id="gameOver">
  <h1>Data Corrupted</h1>
  <button onclick="restart()">Restart</button>
</div>

<canvas id="c" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = 800;
const H = 500;

let keys = {};
let gameOver = false;

let player = {
  x: 380,
  y: 450,
  w: 40,
  h: 40,
  speed: 5
};

let enemies = [];
let score = 0;
let spawnTimer = 0;
let baseSpawnRate = 60; // frames

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// EXACT-style spawn (controlled like Pygame timer)
function spawnEnemy() {
  const types = ["NULL", "DUP", "OUTLIER", "BAD TYPE"];

  enemies.push({
    x: Math.random() * (W - 40),
    y: -40,
    w: 40,
    h: 40,
    type: types[Math.floor(Math.random() * types.length)],
    speed: 2 + (score / 500) // difficulty scaling EXACT like EXE-style ramp
  });
}

// collision (pixel-accurate AABB like Pygame)
function collide(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function update() {
  if (gameOver) return;

  // movement (EXE-style fixed speed)
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  // clamp
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // spawn timing (NOT random spam)
  spawnTimer++;

  let dynamicRate = Math.max(20, baseSpawnRate - Math.floor(score / 200));

  if (spawnTimer >= dynamicRate) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // update enemies
  for (let e of enemies) {
    e.y += e.speed;

    if (collide(player, e)) {
      gameOver = true;
      document.getElementById("gameOver").style.display = "block";
    }
  }

  // cleanup (EXE behavior)
  enemies = enemies.filter(e => e.y < H + 50);

  // scoring (frame-based like EXE)
  score++;
  document.getElementById("score").innerText = Math.floor(score / 10);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // player
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // enemies
  for (let e of enemies) {
    ctx.fillStyle = "#ff4d4d";
    ctx.fillRect(e.x, e.y, e.w, e.h);

    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.fillText(e.type, e.x, e.y - 5);
  }
}

// EXE-style game loop (fixed 60 FPS logic approximation)
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function restart() {
  player.x = 380;
  enemies = [];
  score = 0;
  spawnTimer = 0;
  gameOver = false;
  document.getElementById("gameOver").style.display = "none";
}

loop();
</script>
</body>
</html>
