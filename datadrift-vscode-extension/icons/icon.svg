<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#00ffd5"></stop>
      <stop offset="60%" stop-color="#00cbb8"></stop>
      <stop offset="100%" stop-color="#009b8a"></stop>
    </radialGradient>

    <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2efcff"></stop>
      <stop offset="100%" stop-color="#00ffd5"></stop>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"></circle>

  <!-- Inner depth circle -->
  <circle cx="256" cy="270" r="170" fill="#0a8f86" opacity="0.35"></circle>

  <!-- Chart card -->
  <rect x="140" y="150" width="232" height="140" rx="22" fill="#0b0b2e"></rect>

  <!-- Chart line -->
  <path d="M165 240 L210 200 L255 235 L310 170 L345 150" stroke="url(#cardGlow)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>

  <!-- Bottom avatar silhouette -->
  <path d="M256 420
           C190 420 140 460 120 512
           L392 512
           C372 460 322 420 256 420 Z" fill="#023a34"></path>

  <!-- Subtle highlight ring -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#00ffd5" stroke-opacity="0.25" stroke-width="8"></circle>

</svg>