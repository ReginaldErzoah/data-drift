<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Drift</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #0a0c10;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 18px;
    }

    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #00ffcc;
      border: none;
      color: black;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div id="ui">
    Score: <span id="score">0</span>
  </div>

  <div id="gameOver">
    <h1>Data Corrupted!</h1>
    <button onclick="restart()">Restart</button>
  </div>

  <canvas id="game" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const gameOverScreen = document.getElementById("gameOver");

    let player = { x: 380, y: 450, w: 40, h: 40 };
    let keys = {};
    let enemies = [];
    let score = 0;
    let gameOver = false;

    document.addEventListener("keydown", e => keys[e.key] = true);
    document.addEventListener("keyup", e => keys[e.key] = false);

    function spawnEnemy() {
      const types = ["NULL", "DUP", "OUTLIER", "BAD TYPE"];
      enemies.push({
        x: Math.random() * 760,
        y: -20,
        w: 40,
        h: 40,
        type: types[Math.floor(Math.random() * types.length)],
        speed: 2 + Math.random() * 3
      });
    }

    function update() {
      if (gameOver) return;

      // movement
      if (keys["ArrowLeft"] && player.x > 0) player.x -= 5;
      if (keys["ArrowRight"] && player.x < 760) player.x += 5;

      // spawn enemies
      if (Math.random() < 0.03) spawnEnemy();

      // update enemies
      enemies.forEach(e => {
        e.y += e.speed;

        // collision
        if (
          player.x < e.x + e.w &&
          player.x + player.w > e.x &&
          player.y < e.y + e.h &&
          player.y + player.h > e.y
        ) {
          gameOver = true;
          gameOverScreen.style.display = "block";
        }
      });

      // remove off-screen
      enemies = enemies.filter(e => e.y < 500);

      // score
      score++;
      scoreEl.innerText = Math.floor(score / 10);
    }

    function draw() {
      ctx.clearRect(0, 0, 800, 500);

      // player
      ctx.fillStyle = "#00ffcc";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      // enemies
      enemies.forEach(e => {
        ctx.fillStyle = "#ff4d4d";
        ctx.fillRect(e.x, e.y, e.w, e.h);

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(e.type, e.x, e.y - 5);
      });
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function restart() {
      player.x = 380;
      enemies = [];
      score = 0;
      gameOver = false;
      gameOverScreen.style.display = "none";
      loop();
    }

    loop();
  </script>
</body>
</html>
